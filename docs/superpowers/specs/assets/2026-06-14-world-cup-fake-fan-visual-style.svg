    <rect x="514" y="0" width="90" height="42" fill="#FF5C8A" stroke="#111111" stroke-width="4"/>
    <rect x="624" y="0" width="90" height="42" fill="#71D7FF" stroke="#111111" stroke-width="4"/>
    <text x="744" y="20" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#111111">Yellow #FFD400 · Black #111111 · White #FFFFFF</text>
    <text x="744" y="40" font-family="Arial, 'PingFang SC', sans-serif" font-size="16" font-weight="800" fill="#111111">Pink #FF5C8A · Blue #71D7FF · Paper #FFF7C2</text>
