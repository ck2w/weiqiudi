<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#FFD400"/>
  <rect x="48" y="48" width="1104" height="704" rx="0" fill="#FFF7C2" stroke="#111111" stroke-width="10"/>
